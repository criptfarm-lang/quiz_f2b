<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аттестация менеджера F2B — 50 вопросов</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2540;--accent:#00d4aa;--accent2:#ff6b35;--accent3:#ffd166;--text:#e8edf5;--muted:#6b7fa3;--correct:#00d4aa;--wrong:#ff4d6d;--border:rgba(255,255,255,0.07);--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{max-width:780px;margin:0 auto;padding:32px 20px;position:relative;z-index:1}
.screen{display:none}.screen.active{display:block}

/* START */
.start-center{text-align:center;padding:40px 0}
.logo{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;display:block}
.badge{display:inline-block;background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);color:var(--accent);font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:3px;padding:6px 16px;border-radius:100px;margin-bottom:20px}
h1{font-family:'Unbounded',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:800;line-height:1.2;margin-bottom:12px}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);font-size:14px;line-height:1.6;max-width:480px;margin:0 auto 32px}
.stats-start{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-s{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-s .v{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:800;color:var(--accent)}
.stat-s .l{font-size:11px;color:var(--muted);margin-top:4px}
.btn-start{display:block;width:100%;padding:18px;background:var(--accent);color:#0a0f1e;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;transition:all 0.2s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,212,170,0.3)}

/* QUIZ */
.top-bar{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.prog-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00a8ff);border-radius:3px;transition:width 0.4s ease}
.q-count{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--muted);white-space:nowrap}
.timer-wrap{display:flex;align-items:center;gap:6px;font-family:'Unbounded',sans-serif;font-size:13px;color:var(--accent);white-space:nowrap}
.timer-wrap.warn{color:var(--wrong)}

.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:16px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.q-text{font-size:16px;font-weight:600;line-height:1.55;margin-bottom:22px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 18px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;font-size:14px;font-family:'Manrope',sans-serif;color:var(--text);text-align:left;transition:all 0.2s;position:relative}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(0,212,170,0.05)}
.opt.correct{border-color:var(--correct);background:rgba(0,212,170,0.12);color:var(--correct)}
.opt.wrong{border-color:var(--wrong);background:rgba(255,77,109,0.1);color:var(--wrong)}
.opt:disabled{cursor:default}
.opt-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%)}
.opt-letter{opacity:0.4;margin-right:10px}
.explain{margin-top:14px;padding:12px 16px;background:rgba(0,212,170,0.06);border-left:3px solid var(--accent);border-radius:8px;font-size:13px;color:var(--muted);line-height:1.6;display:none}
.explain.show{display:block}

.bottom-bar{display:flex;gap:12px;align-items:center}
.score-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.score-val{font-family:'Unbounded',sans-serif;color:var(--accent);font-size:18px;font-weight:700}
.btn-next{flex:1;padding:16px;background:var(--accent);color:#0a0f1e;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all 0.2s;display:none}
.btn-next.show{display:block}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,170,0.3)}

/* RESULT */
.result-center{text-align:center;margin-bottom:36px}
.result-ring{width:160px;height:160px;margin:0 auto 24px;position:relative}
.result-ring svg{transform:rotate(-90deg)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Unbounded',sans-serif;font-size:36px;font-weight:800;color:var(--accent)}
.ring-label{font-size:11px;color:var(--muted)}
.result-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px}
.result-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
.stats-res{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.stat-r{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center}
.stat-r .v{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px}
.stat-r .v.g{color:var(--correct)}.stat-r .v.r{color:var(--wrong)}.stat-r .v.y{color:var(--accent3)}
.stat-r .l{font-size:12px;color:var(--muted)}
.screenshot{text-align:center;padding:16px;background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.3);border-radius:var(--r);margin-bottom:20px}
.screenshot div{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--accent)}
.breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:20px}
.breakdown h3{font-family:'Unbounded',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.bd-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.bd-row:last-child{border-bottom:none}
.bd-icon{flex-shrink:0;margin-top:1px}
.bd-q{flex:1;color:var(--muted)}
.bd-a{font-weight:600;white-space:nowrap}.bd-a.ok{color:var(--correct)}.bd-a.fail{color:var(--wrong)}
.btn-row{display:flex;gap:12px}
.btn-outline{flex:1;padding:16px;background:transparent;color:var(--accent);border:2px solid var(--accent);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;border-radius:12px;cursor:pointer;transition:all 0.2s}
.btn-outline:hover{background:var(--accent);color:#0a0f1e}
.btn-primary{flex:1;padding:16px;background:var(--accent);color:#0a0f1e;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all 0.2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,170,0.3)}
@media(max-width:600px){.stats-start,.stats-res{grid-template-columns:1fr 1fr}.btn-row{flex-direction:column}}
</style>
</head>

<script>
var allQ = [
  {q:"Какая производительность у FISH TO BUSINESS?",options:["До 1 000 кг в смену", "До 3 000 кг в смену", "До 7 000 кг в смену", "До 15 000 кг в смену"],answer:2,explain:"Производительность FISH TO BUSINESS — до 7 000 кг в смену. Компания располагает 2 000 м² производственных и складских площадей в собственности."},
  {q:"Какой транспорт использует FISH TO BUSINESS для доставки?",options:["Наёмные курьерские службы", "Собственный специализированный транспорт с реф-установками", "Транспорт клиентов", "Обычные грузовики без холодильников"],answer:1,explain:"FISH TO BUSINESS доставляет продукцию собственным брендированным специализированным транспортом с реф-установками — напрямую до ресторана или до перегруза в транспорт регионального клиента."},
  {q:"Как от ресторанов Москвы и МО принимаются заявки на доставку?",options:["За 3 дня до отгрузки", "До 12:00 текущего дня с доставкой завтра", "До 18:00 текущего дня с доставкой завтра", "Только по предоплате за неделю"],answer:2,explain:"Заявки от ресторанов Москвы и МО принимаются до 18:00 текущего дня с отгрузкой на следующий день."},
  {q:"Сколько довольных клиентов у FISH TO BUSINESS за первый год работы?",options:["100+", "200+", "500+", "1000+"],answer:2,explain:"FISH TO BUSINESS — 500+ довольных клиентов за первый год работы."},
  {q:"В какой упаковке выпускается вся продукция FISH TO BUSINESS?",options:["В вакуумной упаковке FISH TO BUSINESS", "В пакете-запайке на подложке", "Пенопластовый короб со льдом", "В картонных коробах блочно и навалом"],answer:0,explain:"Абсолютно вся продукция FISH TO BUSINESS выпускается в вакуумной упаковке. Филе — как правило на подложке."},
  {q:"Что означает аббревиатура ПБГ?",options:["Потрошёная без головы","Потрошёная без жабр","Полуфабрикат без глазури","Порционный без кости"],answer:0,explain:"ПБГ — потрошёная без головы. Часто используется при описании рыбного сырья. В отличие от ПСГ (потрошёная с головой) — голова удалена."},{q:"Какая аббревиатура относится к готовому филе?",options:["ПСГ","ПБГ","ПР СС","СГ"],answer:2,explain:"ПР СС (Пред Разделка Слабосолёная) — это аббревиатура готового филе. ПСГ и ПБГ относятся к целой рыбе (тушке), а не к филе."},
  {q:"Какие товары в ассортименте F2B являются штучными (не весовыми)?",options:["Всё филе лосося и форели", "Только тунец и кальмар", "Филе-слайсы, суповые наборы, пивные наборы, кубики", "Только охлаждённая рыба"],answer:2,explain:"Вся продукция весовая, кроме: филе-слайсов, суповых наборов, пивных наборов и кубиков — эти товары измеряются в штуках и имеют фиксированный вес."},
  {q:"Что означает сокращение «б/ч» в названии продукта?",options:["Без чешуи", "Без шкуры", "Без чистки", "Быстрая чистка"],answer:0,explain:"Б/ч = без чешуи. Чешуя удалена, но шкура остаётся. Используется для запекания рыбы на шкуре — некоторые рестораны специально запрашивают такой вариант."},
  {q:"В чём уникальность Трим ПР?",options:["Термин придумал партнёр Маланчук А.В. — жаберная крышка специально НЕ удалена", "Это термин рыбного ГОСТ 1990 года", "Трим ПР означает полная разделка", "Это стандарт ЕС — жаберная крышка удалена"],answer:0,explain:"Трим ПР (Пред Разделка) — уникальный термин, придуманный партнёром Маланчуком А.В. Жаберная крышка специально не удаляется — это увеличивает вес и снижает цену. Весь рынок России использует этот термин, но расшифровку знают только сотрудники F2B."},
  {q:"Что удаляется при разделке Трим А?",options:["Хребет, голова, хвост — брюшко, рёберные кости, жир и пин-бон остаются", "Хребет, голова, рёберные кости и жаберная крышка", "Всё кроме мяса", "Только хребет"],answer:0,explain:"Трим А — минимальная разделка. Удалены: хребет, голова, хвост. Остаются: брюшко, рёберные кости, жир, пин-бон. Самая дешёвая разделка."},
  {q:"Чем Трим С отличается от Трим Б?",options:["В Трим С дополнительно удалено брюшко (теша) и жир", "Трим С только для форели", "Трим С дешевле Трим Б", "В Трим С удалена шкура"],answer:0,explain:"Трим С = Трим Б + удалено брюшко (теша) и жир. Получается чистое филе без брюшка. Популярная разделка для ресторанов."},
  {q:"Как визуально отличить Трим С от Трим Д?",options:["Трим Д не отличается от Трим С", "Трим С частично с брюшком и без пин-бон", "Никак — они визуально неотличимы, разница только на ощупь (пин-бон)", "Трим С с жаберной крышкой"],answer:2,explain:"Трим С и Трим Д визуально неотличимы на фото и при осмотре. Разница только на ощупь: в Трим Д удалены косточки пин-бон. Всегда уточняйте разделку по документам."},
  {q:"Какая разделка самая популярная в оптовом сегменте?",options:["Трим С", "Трим Д", "Трим ПР", "Трим Е"],answer:2,explain:"Трим ПР — самая популярная разделка в оптовом сегменте. Жаберная крышка сохранена → ниже цена → идеальный баланс цены и качества для дистрибьюторов."},
  {q:"Что удаляется в разделке Трим Е по сравнению с Трим Д?",options:["Шкура", "Брюшко", "Жаберная крышка", "Рёберные кости"],answer:0,explain:"Трим Е = Трим Д + удалена шкура. Самая чистая и самая дорогая разделка."},
  {q:"Почему для форели мы не выпускаем Трим Д в стандарте?",options:["Пин-бон форели имеют загнутые концы — при машинном удалении рвут мышечные ткани", "Форель слишком мелкая", "Нет спроса на Трим Д форели", "Трим Д для форели слишком дорог в производстве"],answer:0,explain:"Пин-бон форели имеют загнутые концы. При машинном удалении они рвут мышечные ткани. Рекомендуем поварам делать это пинцетом самостоятельно. Трим Д форели — только под спецзаказ и дороже."},
  {q:"Зачем в форели Трим С мы оставляем немного брюшка?",options:["Брюшко всегда полностью удаляется", "Это ошибка производства", "Специально — так дешевле, и рынок к этому привык", "Только у Трим А остаётся брюшко"],answer:2,explain:"При производстве форели Трим С мы оставляем немного брюшка. Это не классика, но так дешевле и рынок давно к этому привык. Трим С форели — основная позиция для ресторанов среднего ценового сегмента."},
  {q:"Откуда поставляется охлаждённая тушка лосося и каков его остаточный срок годности при поступлении?",options:["Из Карелии, остаточный срок 10 суток", "С двух норвежских ферм через Белоруссию, остаточный срок 5-7 суток", "С двух мурманских ферм, остаточный срок 9-10 суток", "Из Норвегии, остаточный срок 10 суток"],answer:2,explain:"Мурманский охлаждённый лосось — с двух ферм, которые снабжают всю страну. Торги по пятницам. Рыба приезжает с остаточным сроком 9-10 суток. Именно поэтому производим строго под заказ."},
  {q:"Лосось Чили — как он попадает в Россию и в каком виде?",options:["По железной дороге за 7 дней, охлаждённый", "Авиа, охлаждённый, за 2 дня", "Рефконтейнерами 30-45 суток через порт СПб, в заморозке", "Автодоставкой из Белоруссии"],answer:2,explain:"Лосось Чили транспортируется в рефрижераторных контейнерах 30-45 суток, прибывает через порт Санкт-Петербург. Приходит только в замороженном виде. Мы производим из него охлаждённое (дефростированное) филе."},
  {q:"Ресторан продаёт «Филадельфию» за 650 рублей. Что предложить?",options:["Форель морскую", "Лосось охлаждённый Мурманск", "Форель пресноводную охл. или СМ", "Нерка СС"],answer:2,explain:"650 руб. — бюджетный сегмент. Форель пресноводная охл. или СМ — оптимальный выбор по цене. Лосось Мурманск для таких клиентов будет слишком дорогим."},
  {q:"Что такое «Филе лосося Трим Д охл» в нашем прайсе?",options:["Филе из мурманского охл. лосося", "Филе пресноводного лосося", "Филе чилийского лосося с глазурью 5%", "Филе из чилийского лосося методом дефростации"],answer:3,explain:"Дефростированный охлаждённый лосось из Чили — это охлаждённое филе, которое мы производим из замороженного чилийского сырья по специальной технологии дефростации в камере. Это наш стандартный охлаждённый продукт для средних ресторанов."},
  {q:"Какие разделки лосося Мурманск наиболее популярны?",options:["Только Трим Е", "Трим ПР СС и ХК", "Трим А и Трим ПР", "Трим Б, Трим С и Трим Д"],answer:3,explain:"Из лосося Мурманск наиболее популярны Трим Б, Трим С и Трим Д. Это премиальный продукт для ресторанов с высоким средним чеком — стоимость «Филадельфии» от 1000 руб. и выше."},
  {q:"Почему импортный чилийский Трим Д нам сложно конкурировать по цене?",options:["Чилийцы делают лучше нас", "Он охлаждённый, а наш замороженный", "Он производится из российского сырья дешевле", "Используется сырьё Стандарт и глазурь"],answer:3,explain:"Импортный Трим Д из Чили — сырьё не Премиум, а Стандарт и Грейд. Встречаются расслоения, бледный цвет, глазурь не менее 5%. Это дискаунтер-сегмент. Предложите таким клиентам пресноводную форель Трим С."},
  {q:"Что значит «Лосось Трим Д Мурманск б/ч»?",options:["Без чешуи", "Без шкуры", "Без кости", "Без хребта — только мясо"],answer:0,explain:"Б/ч = без чешуи. Чешуя удалена, шкура остаётся. Специальная позиция для ресторанов, которые запекают рыбу на шкуре."},
  {q:"В чём принципиальное отличие морской форели от пресноводной?",options:["Пресноводная крупнее и качественнее", "Только в цене", "Морская дешевле пресноводной", "Морская жирнее, со сливочным послевкусием"],answer:3,explain:"Морская форель: повышенная жирность, сливочное послевкусие, нет запахов, крупнее. Для премиальных ресторанов. Пресноводная: нет послевкусия, иногда болотистый запах, мельче, меньший выход на Филадельфию."},
  {q:"Почему Форель Трим ПР называют «локомотивом продаж» в опте?",options:["Самая популярная у ресторанов", "Только она выпускается в охлаждённом виде", "Самая дорогая позиция", "Самая дешёвая позиция из красной рыбы на рынке"],answer:3,explain:"Форель Трим ПР — самая дешёвая позиция из красной рыбы на рынке. Именно поэтому она является локомотивом оптовых продаж. Выпускается во всех размерах: 0,9–1,3 / 1,3–1,5 / 1,5+ кг."},
  {q:"Откуда в основном поставляется сырьё для форели Трим ПР?",options:["Только Карелия", "Только Китай/Тибет", "Норвегия", "В основном Осетия, но меняется в зависимости от конъюнктуры рынка"],answer:3,explain:"Сырьё для форели Трим ПР — в основном Осетия. Однако в зависимости от конъюнктуры рынка регион может меняться. Важно знать это при работе с клиентом."},
  {q:"Какой размер форели Трим С самый востребованный в ресторанах?",options:["1,7–2,0 кг — самый крупный", "Все размеры одинаково популярны", "0,9–1,3 кг — самый дешёвый", "1,2–1,5 кг — оптимальное соотношение цены и размера"],answer:3,explain:"Размер 1,2–1,5 кг — один из самых востребованных благодаря оптимальному соотношению цены и размера. Размер 1,7–2,0 кг бывает не всегда — нужно следить за наличием."},
  {q:"Чем форель Трим Б отличается от Трим ПР?",options:["В Трим Б больше мяса", "Трим Б только для ресторанов", "Трим Б дешевле Трим ПР", "В Трим Б удалена жаберная крышка — поэтому он дороже"],answer:3,explain:"Форель Трим Б = Трим ПР + удалена жаберная крышка. Именно отсутствие жаберной крышки делает его дороже Трим ПР, но дешевле Трим С."},
  {q:"Как правильно позиционировать кету клиенту в ресторане?",options:["Только как отдельное блюдо из лосося", "Кету ресторанам не продаём", "Как дорогой премиальный лосось", "Как доступную альтернативу — кета добавляется к лососю"],answer:3,explain:"Кета — дикий тихоокеанский лосось. Добавляется к лососю, размывая общую себестоимость партии. По российскому законодательству может легально маркироваться как «лосось». Популярна в федеральных сетях."},
  {q:"В какой сезон масляная рыба наиболее востребована?",options:["Март–апрель — к Пасхе", "Июль–август — летний сезон", "Ноябрь–декабрь — сезон корпоративов", "Январь — новогодние праздники"],answer:2,explain:"Масляная рыба (эсколар, прямой импорт из Вьетнама) показывает взрывной рост в ноябрь-декабрь — сезон корпоративов. Используют для закусок, брускетт, рыбных тарелок, сэндвичей."},
  {q:"Почему масляная рыба интересна клиентам для рыбных тарелок?",options:["Чуть дороже палтуса при схожих свойствах", "Дешёвая жирная рыба", "Это самая дорогая рыба в ассортименте", "Дешевле палтуса при аналогичных вкусовых свойствах"],answer:3,explain:"Масляная рыба дешевле палтуса при очень схожих вкусовых свойствах. Это главный аргумент при продаже — снижение фудкоста на рыбных тарелках без потери качества блюда."},
  {q:"Из какого сырья производится тунец ХК?",options:["Из тушки тунца 200+", "Из тихоокеанского тунца еллоуфин", "Из филе тунца саку", "Из филе тунца лойн"],answer:3,explain:"Тунец ХК производится из лоина тунца весом 2+ кг. Засаливается и коптится на ольховой щепе, вакуумируется и замораживается в шоковой камере. Готов к использованию сразу после разморозки."},
  {q:"Кальмар гигантский ХК — в какой сезон наиболее востребован и в каких регионах?",options:["Весной — к Пасхе", "Осенью — в Москве", "Зимой — для новогодних стола по всей России", "Летом — южные курортные регионы как закуска к пиву"],answer:3,explain:"Кальмар гигантский ХК востребован в оптовом сегменте преимущественно летом в южных курортных регионах как популярная закуска к пиву. Также используется в пицце, европейской кухне и роллах."},
  {q:"Почему дикую рыбу нельзя подавать в сыром виде?",options:["У дикой рыбы специфический запах, который исчезает при термообработке", "Нельзя употреблять в сыром виде — риск паразитов; только СС или ХК", "Дикая рыба имеет плотную текстуру — её невозможно нарезать слайсами", "Санитарные нормы запрещают подачу любой рыбы в сыром виде"],answer:1,explain:"Дикую рыбу (кета, кижуч, нерка, горбуша) нельзя употреблять в сыром виде. Поэтому вся готовая продукция из диких лососей выпускается только слабосолёной (СС) или холодного копчения (ХК)."},
  {q:"Какой дикий тихоокеанский лосось считается премиальным и почему?",options:["Горбуша — самый доступный", "Кета — самая яркая", "Нерка — ярко-красное мясо из-за рачков с кератином в рационе", "Кижуч — самый крупный"],answer:2,explain:"Нерка — премиальный тихоокеанский лосось. Мясо красно-оранжевое из-за рачков с кератином в рационе рыбы. Высоко ценится в развитых странах, пока недооценена в России. Самый мелкий — 0,3–1,1 кг."},
  {q:"Горбушу мы не выпускаем стандартно. Что можем предложить под заказ?",options:["Горбушу не выпускаем ни при каких условиях", "Слабосолёное филе и балык под заказ", "Только в замороженном виде без обработки", "Только тушку целиком"],answer:1,explain:"Горбуша — самый массовый и дешёвый вид дикого лосося. Под заказ можем выпускать в виде слабосолёного филе и балыка."},
  {q:"Почему нельзя соглашаться на просрочку с первой сделки?",options:["За это штрафует компания", "Клиент воспримет это как норму и изменить ситуацию будет крайне сложно", "Просрочка это нормально, главное объём", "Только потому что нет отсрочки"],answer:1,explain:"Первая сделка формирует тональность всех дальнейших отношений. Если с первой сделки платёж идёт вовремя — клиенту психологически сложнее нарушать сроки в будущем."},
  {q:"Зачем смотреть цену на «Филадельфию» на сайте ресторана?",options:["Чтобы сравнить с ценами конкурентов", "Чтобы понять ценовой сегмент и сделать правильное предложение по рыбе", "Чтобы узнать есть ли лосось в меню", "Это не нужно"],answer:1,explain:"Цена Филадельфии — быстрый индикатор ценового сегмента: до 700 руб. — форель пресноводная; 700-1000 — средний; 1000+ — лосось Мурманск охл. Без этого сложно сделать точечное предложение."},
  {q:"Что должен сделать менеджер перед первым звонком новому клиенту?",options:["Сразу отправить прайс", "Изучить сайт и меню, понять специфику бизнеса, масштаб, ценовой сегмент", "Назначить встречу в офисе", "Запросить ИНН"],answer:1,explain:"Перед первым контактом обязательно: изучить сайт и меню, понять ценовой сегмент, масштаб бизнеса. Только тогда можно сделать точечное предложение."},
  {q:"Как правильно реагировать на просрочку по оплате?",options:["Игнорировать — само решится", "С лёгким недоумением, говорить от первого лица — это возмущает лично вас как менеджера", "Угрожать прекратить поставки", "Ссылаться на директора и правила компании"],answer:1,explain:"Первая реакция — лёгкое недоумение. Важно говорить от первого лица: ситуация возмущает именно вас, потому что вы лично договорились об условиях. Не ссылайтесь на компанию — это разрушает личный авторитет."},
  {q:"Какой новый клиент наиболее выгоден с точки зрения логистики?",options:["Крупный клиент с большим объёмом", "Клиент рядом с уже действующим — доставка уже едет в этот район", "Клиент в центре города", "Клиент с высоким чеком"],answer:1,explain:"Клиент рядом с действующим — минимальные логистические затраты. Доставка уже идёт в этот район, маршрут оптимизирован. Максимальная рентабельность без роста издержек."},
  {q:"Где создаётся новая сделка в AmoCRM?",options:["В любой воронке по усмотрению менеджера", "Только в воронке «Холодный клиент» — один раз", "В воронке «Цикличные продажи»", "В воронке «Оплаты»"],answer:1,explain:"Сделка на компанию создаётся только один раз и только в воронке «Холодный клиент». Далее она автоматически переходит в «Цикличные продажи»."},
  {q:"Как правильно отправить прайс клиенту?",options:["Отправить PDF на email", "Написать в АМО слово «прайс», выбрать шаблон со ссылкой", "Отправить в WhatsApp", "Скинуть фото экрана"],answer:1,explain:"Единственный разрешённый способ — написать в AmoCRM слово «прайс», выбрать шаблон со ссылкой на анкету и отправить клиенту. PDF или прямые ссылки — нарушение регламента."},
  {q:"Как оформляется отгрузка образцов клиенту?",options:["Стандартная накладная по полной цене", "Через компанию «Розничный покупатель» по цене 1 руб., в комментариях указывается реальный получатель", "Только после подписания договора", "Образцы не выдаются"],answer:1,explain:"Отгрузка образцов (маркетинг) идёт через компанию «Розничный покупатель» по цене 1 руб. В комментариях указывается реальный получатель. Далее — стандартный цикл."},
  {q:"По каким дням Ассистент Эф готовит сводку по дебиторской задолженности?",options:["Ежедневно", "По понедельникам и средам", "По пятницам", "Раз в месяц"],answer:1,explain:"Электронный ассистент отдела продаж Эф готовит сводку по просроченной дебиторской задолженности по понедельникам и средам. В личку боту необходимо давать ответы по всем просрочкам."},
  {q:"Можно ли менеджеру обсуждать свою зарплату с коллегами?",options:["Да, это личное дело", "Нет — это коммерческая тайна, запрещено NDA", "Можно только с прямым руководителем", "Можно вне офиса"],answer:1,explain:"Раскрытие информации о зарплате и бонусах — нарушение NDA вне зависимости от места и формата разговора. Касается любых коллег в любой обстановке."},
  {q:"Назовите ключевые УТП FISH TO BUSINESS для ресторанов",options:["Реф-доставка, отсрочка от 2-й поставки, склад в наличии, широкий ассортимент", "Собственное производство, реф-доставка, отсрочка с первой поставки, охлаждённая рыба ночью под заказ", "Низкая цена, быстрая доставка, отсрочка от 30 дней, бесплатные образцы", "Производство, доставка, отсрочка от 3-й поставки, охлаждённая рыба со склада"],answer:1,explain:"4 УТП F2B: 1) Собственное производство — претензии решаются напрямую. 2) Реф-доставка до ресторана. 3) Отсрочка с первой поставки. 4) Охлаждённая рыба производится ночью строго под заказ."},
  {q:"Что такое фудкост и почему он важен в разговоре с рестораном?",options:["Стоимость ресторанного оборудования", "Себестоимость готового блюда — чем дешевле рыба в закупке, тем ниже фудкост и выше маржа ресторана", "Стоимость доставки продуктов", "Налог на продукты питания"],answer:1,explain:"Фудкост — себестоимость готового блюда. Основной фактор влияния — стоимость главного ингредиента (рыбы). Понимание фудкоста помогает правильно аргументировать цену клиенту."},
  {q:"Как приходит заказ, оформленный клиентом самостоятельно через личный кабинет?",options:["Напрямую на склад с данными клиента","От «Розничного покупателя» — в комментарии указан контакт клиента","На email менеджера в виде заявки","В AmoCRM как новая сделка автоматически"],answer:1,explain:"Заказ приходит на склад от «Розничного покупателя», в комментариях указан контакт клиента. Менеджер должен дооформить такой заказ."},
  {q:"Зачем менеджер должен приучать клиентов делать заказы самостоятельно?",options:["Чтобы клиент видел актуальные цены без звонка","Это требование службы безопасности","Это снижает нагрузку на менеджера и автоматизирует процессы","Чтобы сократить количество ошибок в заказах"],answer:2,explain:"Самостоятельные заказы через личный кабинет существенно снижают нагрузку на менеджера и автоматизируют процессы. Задача менеджера — обучить клиента пользоваться кабинетом."},
  {q:"От чего зависит количество вопросов в программе FISHки после заказа?",options:["От количества позиций в заказе","От суммы заказа — чем больше сумма, тем больше вопросов","Всегда одинаковое количество — 5 вопросов","От частоты заказов — чем чаще, тем больше вопросов"],answer:1,explain:"Количество вопросов в программе FISHки зависит от суммы заказа — чем больше сумма, тем больше вопросов получает клиент."},

var shuffled = [];
var current = 0;
var score = 0;
var answers = [];
var answered = false;
var timerInterval = null;
var timeLeft = 1500;
var timeSpent = 0;
var timerStartTime = null;
var timerStartLeft = 1500;
var timerStartTime = null;
var timerStartLeft = 1500;

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  return arr;
}

function startQuiz(){
  shuffled = shuffle([...allQ]);
  current = 0; score = 0; answers = []; timeLeft = 900; timeSpent = 0;
  document.getElementById('score').textContent = 0;
  showQ();
  showScreen('quiz');
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  timerStartTime = Date.now();
  timerStartLeft = timeLeft;
  timerInterval = setInterval(function(){
    var elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
    timeLeft = timerStartLeft - elapsed;
    timeSpent = 1500 - timeLeft;
    if(timeLeft < 0) timeLeft = 0;
    var m = Math.floor(timeLeft/60);
    var s = timeLeft%60;
    var tw = document.getElementById('timer-wrap');
    document.getElementById('timer').textContent = m+':'+(s<10?'0':'')+s;
    if(timeLeft <= 60) tw.classList.add('warn');
    if(timeLeft <= 0){ clearInterval(timerInterval); showResult(); }
  }, 500);
}

function handleVisibilityChange(){
  if(!document.hidden && timerStartTime !== null){
    // пересчитываем от реального времени старта — таймер не сбивается
    var elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
    timeLeft = timerStartLeft - elapsed;
    if(timeLeft <= 0){ clearInterval(timerInterval); showResult(); return; }
    // восстанавливаем кнопку если был дан ответ
    if(answered){
      document.getElementById('btn-next').classList.add('show');
    }
  }
}
document.addEventListener('visibilitychange', handleVisibilityChange);

function showQ(){
  answered = false;
  var q = shuffled[current];
  var pct = (current / shuffled.length) * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('q-count').textContent = (current+1) + ' / ' + shuffled.length;
  document.getElementById('btn-next').classList.remove('show');

  var opts = q.options.map(function(o,i){
    return '<button class="opt" onclick="selectOpt('+i+')" id="opt-'+i+'"><span class="opt-letter">'+['А','Б','В','Г'][i]+'</span>'+o+'</button>';
  }).join('');

  document.getElementById('quiz-content').innerHTML =
    '<div class="quiz-card">' +
    '<div class="q-label">Вопрос ' + (current+1) + ' из ' + shuffled.length + '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="options">' + opts + '</div>' +
    '<div class="explain" id="explain">' + q.explain + '</div>' +
    '</div>';

  document.getElementById('btn-next').textContent = current === shuffled.length-1 ? 'Завершить ✓' : 'Следующий →';
}

function selectOpt(idx){
  if(answered) return;
  answered = true;
  var q = shuffled[current];
  var ok = idx === q.answer;
  if(ok) score++;
  document.querySelectorAll('.opt').forEach(function(el,i){
    el.disabled = true;
    if(i===q.answer){ el.classList.add('correct'); el.innerHTML += '<span class="opt-icon">✓</span>'; }
    else if(i===idx && !ok){ el.classList.add('wrong'); el.innerHTML += '<span class="opt-icon">✗</span>'; }
  });
  document.getElementById('explain').classList.add('show');
  document.getElementById('score').textContent = score;
  document.getElementById('btn-next').classList.add('show');
  answers.push({q:q.q, correct:ok, right:q.options[q.answer]});
}

function nextQ(){
  if(current < shuffled.length-1){ current++; showQ(); }
  else{ clearInterval(timerInterval); showResult(); }
}

function showResult(){
  var total = shuffled.length;
  var pct = Math.round(score/total*100);
  var spent = timeSpent;
  var sm = Math.floor(spent/60), ss = spent%60;

  document.getElementById('r-pct').textContent = pct+'%';
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = total-score;
  document.getElementById('r-time').textContent = sm+':'+(ss<10?'0':'')+ss;

  setTimeout(function(){
    var el = document.getElementById('result-circle');
    el.style.transition = 'stroke-dashoffset 1s ease';
    el.style.strokeDashoffset = 427-(pct/100)*427;
  }, 200);

  var passed = pct >= 80;
  document.getElementById('r-title').textContent = pct>=90?'🏆 Отлично!':pct>=80?'✅ Аттестация сдана':pct>=60?'📚 Нужно повторить':'❌ Не сдана';
  document.getElementById('r-sub').textContent = passed ? 'Поздравляем! Норма 80% выполнена.' : 'Для сдачи нужно 80% и выше. Изучите курс и попробуйте снова.';

  var wrong = answers.filter(function(a){return !a.correct;});
  var ok = answers.filter(function(a){return a.correct;});
  var sorted = wrong.concat(ok);
  document.getElementById('r-breakdown').innerHTML = sorted.map(function(a){
    return '<div class="bd-row"><span class="bd-icon">'+(a.correct?'✅':'❌')+'</span><span class="bd-q">'+a.q+'</span><span class="bd-a '+(a.correct?'ok':'fail')+'">'+(a.correct?'Верно':a.right.substring(0,35)+'...')+'</span></div>';
  }).join('');

  showScreen('result');
  var now = new Date();
  var pad = function(n){ return n < 10 ? '0'+n : n; };
  var dateStr = pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  document.getElementById('screenshot-datetime').textContent = dateStr;
}

function restart(){
  showScreen('start');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}
</script>
